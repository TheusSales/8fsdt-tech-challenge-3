name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Type-check
        run: npx tsc -b

      - name: Build (Vite)
        run: npm run build

      - name: Build Docker image
        run: docker build -t tech-challenge-3:ci .
